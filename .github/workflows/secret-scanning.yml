#Goal - To ensure no secrets have been leaked in the code.

name: Secret Scanning

on:
    workflow_call:
    
jobs:
    scan-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v7
            with:
              fetch-depth: 0 # Scans all the commits as well from starting till now.allow-unsafe-pr-checkout: 

          - name: Gitleaks Scanner
            uses: gitleaks/gitleaks-action@v3
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}