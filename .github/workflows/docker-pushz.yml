# Goal -Push the images to DockerHub 
name: Docker pUsh

on: 
  workflow_call: # you can call this workflow from another workflow

jobs:
    frontend:
        # Github runner
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                folders: ['frontend', 'backend']
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7



            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ${{ matrix.folders }}
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folders }}:latest
                
    
 