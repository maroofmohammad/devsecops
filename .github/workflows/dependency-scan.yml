# Goal - I have to ensure the packages n dependencies have been audited for security.

name: Dependency Scan

on:
  workflow_call:

jobs:
    dependency-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: '1.22'
                go-version-file: 'go.mod'
                cache-dependency-path: go.sum
            
            - name: Install Go vulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

            - name: Run Go vulncheck
              continue-on-error: true # Ensures that the workflow continues even if the command fails
              run: govulncheck ./... > govulncheck-report.txt
              working-directory: backend

            

            - name: Setup NodeJs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Run Dependency scan for Node
              run: npm audit
              working-directory: frontend

              
            - name: Upload report to Artifact
              if: always() # ENsures report is uploaded even if test fails
              uses: actions/upload-artifact@v4
              with:
                name: job-report
                path: reports/govulncheck-report.txt   
                retention-days: 5    