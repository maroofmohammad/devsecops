# Goal - To run End to End DevSecOps Ci Pipeline.

name: DevSecOps CI

on:
  push:
    branches: [master]
    
jobs:

    # Code stage (With Shift Left Security)
    code-quality:
        uses: ./.github/workflows/code-quality.yml 

    # Secret Scanning stage (With Shift Left Security)
    secret-scanning:
        uses: ./.github/workflows/secret-scanning.yml


    # Dependency Checks
    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    
    # Docker checks
    docker-checks:
        uses: ./.github/workflows/docker-scans.yml
        secrets: inherit

    
    # Code Tests
    code-tests:
        uses: ./.github/workflows/code-tests.yml
        secrets: inherit


    # Docker Push
    docker-push:    
        uses: ./.github/workflows/docker-pushz.yml
        needs: [code-quality, secret-scanning, dependency-scan, docker-checks, code-tests]
        secrets: inherit